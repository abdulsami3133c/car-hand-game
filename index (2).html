<!DOCTYPE html>
<html>
<head>
<title>Hand Control Car Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        background: #111;
        font-family: Arial;
        color: white;
        text-align: center;
        overflow: hidden;
    }

    #controls {
        margin-top: 10px;
    }

    button {
        padding: 12px 20px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        margin: 5px;
        cursor: pointer;
        font-weight: bold;
    }

    #startBtn { background: #00cc44; color: white; }
    #pauseBtn { background: #ff9933; color: white; display: none; }
    #resumeBtn { background: #0099ff; color: white; display: none; }

    #gameArea {
        width: 100%;
        height: 85vh;
        position: relative;
        overflow: hidden;
        background: #222;
        border-top: 3px solid #fff;
    }

    #car {
        width: 70px;
        height: 120px;
        background: #00aaff;
        border: 4px solid white;
        border-radius: 10px;
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        box-shadow: 0 0 20px #00c8ff;
    }

    .wheel {
        width: 18px;
        height: 35px;
        background: black;
        position: absolute;
        border-radius: 5px;
    }
    .wheel.left { left: -20px; top: 20px; }
    .wheel.right { right: -20px; top: 20px; }
    .wheel.left2 { left: -20px; bottom: 20px; }
    .wheel.right2 { right: -20px; bottom: 20px; }

    .obstacle {
        width: 60px;
        height: 60px;
        background: red;
        border-radius: 10px;
        position: absolute;
    }

    #score {
        position: absolute;
        top: 10px;
        left: 10px;
        font-size: 26px;
        color: #fff;
    }

    #video {
        display: none;
    }
</style>
</head>
<body>

<h2>🚗 Hand-Controlled Car Game</h2>

<div id="controls">
    <button id="startBtn">START</button>
    <button id="pauseBtn">PAUSE</button>
    <button id="resumeBtn">RESUME</button>
</div>

<div id="score">Score: 0</div>

<div id="gameArea">
    <div id="car">
        <div class="wheel left"></div>
        <div class="wheel right"></div>
        <div class="wheel left2"></div>
        <div class="wheel right2"></div>
    </div>
</div>

<video id="video" width="300" autoplay></video>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
let gameArea = document.getElementById("gameArea");
let car = document.getElementById("car");
let scoreDisplay = document.getElementById("score");

let startBtn = document.getElementById("startBtn");
let pauseBtn = document.getElementById("pauseBtn");
let resumeBtn = document.getElementById("resumeBtn");

let score = 0;
let running = false;
let paused = false;
let obstacleInterval = null;

let handPresent = false;     
let handLostTime = 0;        

/* ------------------------------
   START GAME
---------------------------------*/
startBtn.onclick = () => {
    running = true;
    paused = false;

    startBtn.style.display = "none";
    pauseBtn.style.display = "inline-block";

    startObstacles();
    startHandTracking();
};

/* ------------------------------
   MANUAL PAUSE
---------------------------------*/
pauseBtn.onclick = () => {
    paused = true;
    pauseBtn.style.display = "none";
    resumeBtn.style.display = "inline-block";
    clearInterval(obstacleInterval);
};

/* ------------------------------
   MANUAL RESUME
---------------------------------*/
resumeBtn.onclick = () => {
    paused = false;
    resumeBtn.style.display = "none";
    pauseBtn.style.display = "inline-block";
    startObstacles();
};

/* ------------------------------
   AUTO PAUSE / RESUME
---------------------------------*/
function autoPause() {
    if (!paused) {
        paused = true;
        pauseBtn.style.display = "none";
        resumeBtn.style.display = "none"; // hide manual buttons
        clearInterval(obstacleInterval);
        console.log("GAME AUTO-PAUSED");
    }
}

function autoResume() {
    if (paused && running) {
        paused = false;
        pauseBtn.style.display = "inline-block";
        resumeBtn.style.display = "none";
        startObstacles();
        console.log("GAME AUTO-RESUMED");
    }
}

/* ------------------------------
   OBSTACLES
---------------------------------*/
function startObstacles() {
    obstacleInterval = setInterval(() => {
        if (!running || paused) return;

        let obs = document.createElement("div");
        obs.classList.add("obstacle");
        obs.style.top = "0px";
        obs.style.left = Math.random() * (window.innerWidth - 60) + "px";
        gameArea.appendChild(obs);

        let fall = setInterval(() => {
            if (paused) return;

            let obsTop = parseInt(obs.style.top);
            obs.style.top = (obsTop + 5) + "px";

            let obsRect = obs.getBoundingClientRect();
            let carRect = car.getBoundingClientRect();

            if (!(obsRect.bottom < carRect.top ||
                  obsRect.top > carRect.bottom ||
                  obsRect.right < carRect.left ||
                  obsRect.left > carRect.right)) {

                alert("💥 Game Over! Score: " + score);
                location.reload();
            }

            if (obsTop > window.innerHeight) {
                obs.remove();
                score++;
                scoreDisplay.innerHTML = "Score: " + score;
            }

        }, 20);

    }, 1500);
}

/* ------------------------------
   HAND TRACKING
---------------------------------*/
async function startHandTracking() {
    const video = document.getElementById("video");

    const hands = new Hands({
        locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.5
    });

    hands.onResults(results => {

        if (!running) return;

        if (results.multiHandLandmarks.length > 0) {
            handPresent = true;
            autoResume(); // auto resume game

            let x = results.multiHandLandmarks[0][0].x;
            let posX = (1 - x) * window.innerWidth;
            car.style.left = posX + "px";
        } 
        else {
            if (handPresent) {
                handPresent = false;
                handLostTime = Date.now();
            }

            // if hand missing for more than 500 ms → auto pause
            if (Date.now() - handLostTime > 500) {
                autoPause();
            }
        }

    });

    const cam = new Camera(video, {
        onFrame: async () => {
            await hands.send({ image: video });
        },
        width: 300,
        height: 200
    });

    cam.start();
}
</script>

</body>
</html>
