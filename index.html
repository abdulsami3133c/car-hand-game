<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultimate AI Space Racing Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    font-family:Arial;
    color:white;
}

/* TOP BAR */

#topBar{
    position:absolute;
    top:10px;
    width:100%;
    display:flex;
    justify-content:space-around;
    align-items:center;
    z-index:1000;
    flex-wrap:wrap;
    font-size:18px;
    font-weight:bold;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    background:#00aaff;
    color:white;
}

/* GAME AREA */

#gameArea{
    width:100%;
    height:100vh;
    overflow:hidden;
    position:relative;
    background:
    linear-gradient(to bottom,
    #000000,#111133,#000000);
}

/* STARS */

.star{
    width:3px;
    height:3px;
    background:white;
    position:absolute;
    border-radius:50%;
    opacity:.8;
}

/* PLAYER */

#car{
    width:80px;
    height:130px;
    background:
    linear-gradient(to bottom,#00c8ff,#0066ff);

    position:absolute;
    bottom:30px;
    left:50%;

    transform:translateX(-50%);

    border-radius:15px;

    border:3px solid white;

    box-shadow:0 0 25px cyan;
}

/* GUN */

#gun{
    width:12px;
    height:40px;
    background:silver;
    position:absolute;
    top:-35px;
    left:34px;
    border-radius:10px;
}

/* FLAMES */

.flame{
    width:18px;
    height:35px;
    background:orange;
    position:absolute;
    bottom:-30px;
    border-radius:50%;
    animation:flameAnim .2s infinite;
    display:none;
}

#flame1{
    left:10px;
}

#flame2{
    right:10px;
}

@keyframes flameAnim{

    0%{
        transform:scaleY(1);
        background:orange;
    }

    50%{
        transform:scaleY(1.6);
        background:yellow;
    }

    100%{
        transform:scaleY(1);
        background:red;
    }
}

/* ENEMY */

.enemy{
    width:80px;
    height:80px;

    background:
    radial-gradient(circle,lime,green);

    border-radius:50% 50% 20% 20%;

    position:absolute;

    top:-100px;

    border:3px solid white;

    box-shadow:0 0 25px lime;
}

/* COINS */

.coin{
    width:40px;
    height:40px;
    border-radius:50%;
    background:gold;
    position:absolute;
    box-shadow:0 0 20px yellow;
}

/* BULLETS */

.bullet{
    width:8px;
    height:20px;
    background:yellow;
    position:absolute;
    border-radius:5px;
    box-shadow:0 0 15px yellow;
}

/* EXPLOSION */

.explosion{
    width:80px;
    height:80px;
    background:orange;
    border-radius:50%;
    position:absolute;
    animation:explode .5s forwards;
}

@keyframes explode{

    0%{
        transform:scale(.5);
        opacity:1;
    }

    100%{
        transform:scale(2);
        opacity:0;
    }
}

/* GAME OVER */

#gameOver{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,.9);
    padding:30px;
    border-radius:20px;
    display:none;
    z-index:1000;
    text-align:center;
}

#video{
    display:none;
}

</style>
</head>

<body>

<div id="topBar">

<div>🏁 Score:
<span id="score">0</span></div>

<div>🪙 Coins:
<span id="coins">0</span></div>

<div>⚡ Nitro:
<span id="nitro">READY</span></div>

<div>🔫 Ammo:
<span id="ammo">30</span></div>

<div>🏆 Best:
<span id="bestScore">0</span></div>

<button id="startBtn">
START
</button>

</div>

<div id="gameArea">

<div id="car">

<div id="gun"></div>

<div class="flame" id="flame1"></div>

<div class="flame" id="flame2"></div>

</div>

<div id="gameOver">

<h1>💥 GAME OVER</h1>

<h2 id="finalScore"></h2>

<button onclick="location.reload()">
RESTART
</button>

</div>

</div>

<video id="video"
autoplay
playsinline></video>

<!-- AUDIO -->

<audio id="shootSound"
src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_12b0c7443c.mp3?filename=laser-81720.mp3">
</audio>

<audio id="crashSound"
src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7f3fd8f7f8.mp3?filename=car-crash-110371.mp3">
</audio>

<!-- MEDIAPIPE -->

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

/* VARIABLES */

const gameArea = document.getElementById("gameArea");
const car = document.getElementById("car");

const scoreText = document.getElementById("score");
const coinText = document.getElementById("coins");
const nitroText = document.getElementById("nitro");
const ammoText = document.getElementById("ammo");
const bestText = document.getElementById("bestScore");

const flame1 = document.getElementById("flame1");
const flame2 = document.getElementById("flame2");

let score = 0;
let coins = 0;
let speed = 5;

let ammo = 30;
let reloading = false;

let gameRunning = false;
let firing = false;
let nitroCooldown = false;

let best = localStorage.getItem("bestScore") || 0;
bestText.innerHTML = best;

/* CREATE STARS */

for(let i=0;i<120;i++){

    let star = document.createElement("div");

    star.classList.add("star");

    star.style.left = Math.random()*100+"%";
    star.style.top = Math.random()*100+"%";

    gameArea.appendChild(star);
}

/* START GAME */

document.getElementById("startBtn").onclick = ()=>{

    gameRunning = true;

    document.getElementById("startBtn").style.display="none";

    startGame();

    startHandTracking();
};

/* GAME LOOP */

function startGame(){

    setInterval(createEnemy,1200);

    setInterval(createCoin,3000);

    requestAnimationFrame(playGame);
}

function playGame(){

    if(!gameRunning) return;

    moveEnemies();
    moveCoins();

    score++;

    scoreText.innerHTML = score;

    requestAnimationFrame(playGame);
}

/* ENEMIES */

function createEnemy(){

    if(!gameRunning) return;

    let enemy = document.createElement("div");

    enemy.classList.add("enemy");

    enemy.style.left =
    Math.random()*(window.innerWidth-100)+"px";

    enemy.y = -100;

    gameArea.appendChild(enemy);
}

function moveEnemies(){

    let enemies =
    document.querySelectorAll(".enemy");

    enemies.forEach(enemy=>{

        enemy.y += speed;

        enemy.style.top = enemy.y+"px";

        if(isCollide(car,enemy)){

            endGame();
        }

        if(enemy.y > window.innerHeight){

            enemy.remove();
        }
    });
}

/* COINS */

function createCoin(){

    if(!gameRunning) return;

    let coin =
    document.createElement("div");

    coin.classList.add("coin");

    coin.style.left =
    Math.random()*(window.innerWidth-50)+"px";

    coin.y = -50;

    gameArea.appendChild(coin);
}

function moveCoins(){

    let allCoins =
    document.querySelectorAll(".coin");

    allCoins.forEach(coin=>{

        coin.y += speed;

        coin.style.top =
        coin.y+"px";

        if(isCollide(car,coin)){

            coins++;

            coinText.innerHTML = coins;

            coin.remove();
        }

        if(coin.y > window.innerHeight){

            coin.remove();
        }
    });
}

/* COLLISION */

function isCollide(a,b){

    let aRect = a.getBoundingClientRect();
    let bRect = b.getBoundingClientRect();

    return !(

        aRect.bottom < bRect.top ||
        aRect.top > bRect.bottom ||
        aRect.right < bRect.left ||
        aRect.left > bRect.right
    );
}

/* GAME OVER */

function endGame(){

    if(!gameRunning) return;

    gameRunning = false;

    document.getElementById("crashSound").play();

    document.getElementById("gameOver")
    .style.display="block";

    document.getElementById("finalScore")
    .innerHTML = "Final Score : " + score;

    if(score > best){

        localStorage.setItem(
        "bestScore",score);
    }
}

/* SHOOT */

function shootBullet(){

    if(ammo<=0 || reloading) return;

    ammo--;

    ammoText.innerHTML = ammo;

    document.getElementById("shootSound")
    .currentTime = 0;

    document.getElementById("shootSound")
    .play();

    let bullet =
    document.createElement("div");

    bullet.classList.add("bullet");

    bullet.style.left =
    (car.offsetLeft + 36)+"px";

    bullet.y =
    window.innerHeight - 170;

    bullet.style.top =
    bullet.y+"px";

    gameArea.appendChild(bullet);

    let moveBullet =
    setInterval(()=>{

        bullet.y -= 18;

        bullet.style.top =
        bullet.y+"px";

        let enemies =
        document.querySelectorAll(".enemy");

        enemies.forEach(enemy=>{

            if(isCollide(bullet,enemy)){

                createExplosion(
                enemy.offsetLeft,
                enemy.offsetTop);

                enemy.remove();

                bullet.remove();

                score += 100;

                clearInterval(moveBullet);
            }
        });

        if(bullet.y < -50){

            bullet.remove();

            clearInterval(moveBullet);
        }

    },20);

    if(ammo<=0){

        reloadAmmo();
    }
}

/* RELOAD */

function reloadAmmo(){

    reloading = true;

    ammoText.innerHTML =
    "Reloading...";

    setTimeout(()=>{

        ammo = 30;

        ammoText.innerHTML = ammo;

        reloading = false;

    },3000);
}

/* AUTO FIRE */

function autoFire(){

    if(firing || reloading) return;

    firing = true;

    let bullets = 0;

    let fireInterval =
    setInterval(()=>{

        if(bullets >= 30){

            clearInterval(fireInterval);

            firing = false;

            return;
        }

        shootBullet();

        bullets++;

    },166);
}

/* EXPLOSION */

function createExplosion(x,y){

    let explosion =
    document.createElement("div");

    explosion.classList.add("explosion");

    explosion.style.left = x+"px";
    explosion.style.top = y+"px";

    gameArea.appendChild(explosion);

    setTimeout(()=>{

        explosion.remove();

    },500);
}

/* HAND TRACKING */

async function startHandTracking(){

    const video =
    document.getElementById("video");

    const hands = new Hands({

        locateFile:file=>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({

        maxNumHands:1,
        modelComplexity:0,
        minDetectionConfidence:.7,
        minTrackingConfidence:.7
    });

    hands.onResults(results=>{

        if(results.multiHandLandmarks.length > 0){

            let landmarks =
            results.multiHandLandmarks[0];

            /* MOVE CAR */

            let x = landmarks[9].x;

            let moveX =
            (1-x)*(window.innerWidth-80);

            car.style.left =
            moveX+"px";

            /* FINGER DETECTION */

            let index =
            landmarks[8].y <
            landmarks[6].y;

            let middle =
            landmarks[12].y <
            landmarks[10].y;

            let ring =
            landmarks[16].y <
            landmarks[14].y;

            let pinky =
            landmarks[20].y <
            landmarks[18].y;

            let fingerCount = 0;

            if(index) fingerCount++;
            if(middle) fingerCount++;
            if(ring) fingerCount++;
            if(pinky) fingerCount++;

            /* OPEN PALM */

            if(fingerCount >= 4){

                speed = 5;

                nitroText.innerHTML =
                "READY";

                flame1.style.display =
                "none";

                flame2.style.display =
                "none";
            }

            /* CLOSED FIST */

            if(fingerCount === 0 &&
            !nitroCooldown){

                speed = 18;

                nitroText.innerHTML =
                "BOOST";

                flame1.style.display =
                "block";

                flame2.style.display =
                "block";

                nitroCooldown = true;

                setTimeout(()=>{

                    speed = 5;

                    nitroText.innerHTML =
                    "READY";

                    flame1.style.display =
                    "none";

                    flame2.style.display =
                    "none";

                    nitroCooldown = false;

                },5000);
            }

            /* ONE FINGER */

            if(fingerCount === 1){

                autoFire();
            }
        }
    });

    const camera =
    new Camera(video,{

        onFrame:async()=>{

            await hands.send({
                image:video
            });
        },

        width:640,
        height:480
    });

    camera.start();
}

</script>

</body>
</html>
